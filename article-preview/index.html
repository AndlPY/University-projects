<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <title>Article Preview</title>
</head>
<body>
  <main class="page">
    <article class="article-card">
      <img
        class="article-card__image"
        src="assets/images/blog_image.png"
        alt="Waymo car driving beneath Alphabet Ads text"
      >

      <div class="article-card__content">
        <div>
          <h1 class="article-card__title">
            Waymo Is A Trillion-Dollar Opportunity. Google Just Needs To Seize It
          </h1>
          <p class="article-card__excerpt">
            The self-driving tech unit is expanding but if Alphabet pushed harder, Waymo could dominate a new market with the potential to generate more revenue than its ad business.
          </p>
        </div>

        <footer class="article-card__footer">
          <div class="author">
            <img class="author__avatar" src="assets/images/avatar_male.png" alt="Article author">
            <div>
              <p class="author__name"><span aria-hidden="true">&#8249;</span> Your name <span aria-hidden="true">&#8250;</span></p>
              <time class="author__date" datetime="2026-09-01">01 Sept 2026</time>
            </div>
          </div>

          <div class="share" data-share>

              <span class="share__label">Share</span>
